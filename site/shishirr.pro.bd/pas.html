<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* একদম ছবির মতো ডার্ক ডিজাইন এখানে */
        body {
            background-color: #0f111a;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        h1 {
            color: #4a90e2; /* ছবির সেই উজ্জ্বল নীল রঙ */
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            color: #a0a0a0;
            font-size: 18px;
        }

        input[type="number"] {
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 8px;
            width: 70px;
            border-radius: 10px;
            text-align: center;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            text-align: left;
            margin-bottom: 30px;
        }

        label {
            display: flex;
            align-items: center;
            font-size: 18px;
            color: #a0a0a0;
            cursor: pointer;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            accent-color: #4a90e2;
        }

        .btn-blue {
            width: 100%;
            background-color: #4a90e2;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .result-field {
            width: 100%;
            height: 50px;
            background-color: #1a1d29;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
        }

        .btn-outline {
            width: 100%;
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Times New Roman', serif;
            margin-bottom: 15px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="container">
    <h1>Password Generator</h1>

    <div class="row">
        <span>Password Length:</span>
        <input type="number" id="length" value="12">
    </div>

    <div class="options-grid">
        <label><input type="checkbox" id="upper" checked> Uppercase</label>
        <label><input type="checkbox" id="lower" checked> Lowercase</label>
        <label><input type="checkbox" id="nums" checked> Numbers</label>
        <label><input type="checkbox" id="syms" checked> Symbols</label>
    </div>

    <button class="btn-blue" onclick="generate()">Generate Password</button>

    <div class="result-field" id="output"></div>

    <button class="btn-outline" onclick="copy()">Copy to Clipboard</button>
    <button class="btn-outline">← Back to Tools</button>
</div>

<script>
    function generate() {
        const length = document.getElementById('length').value;
        const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
        let retVal = "";
        for (let i = 0; i < length; ++i) {
            retVal += charset.charAt(Math.floor(Math.random() * charset.length));
        }
        document.getElementById('output').innerText = retVal;
    }

    function copy() {
        const text = document.getElementById('output').innerText;
        if(text) {
            navigator.clipboard.writeText(text);
            alert("Copied!");
        }
    }
</script>

</body>
</html>
