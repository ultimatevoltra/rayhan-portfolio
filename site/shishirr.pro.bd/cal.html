<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Advanced Calculator </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Reset and base */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      font-size: 16px; /* Base font size */
    }
    body {
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; /* Changed font */
      background: var(--bg-gradient); /* Use gradient */
      color: var(--text-color);
      transition: background 0.5s ease, color 0.3s ease; /* Slower background transition */
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
      flex-direction: column;
    }

    :root {
      --bg-color-start: #e8eaf6; /* Lighter lavender */
      --bg-color-end: #f0f0f3; /* Existing light */
      --bg-gradient: linear-gradient(145deg, var(--bg-color-start), var(--bg-color-end));
      --text-color: #333; /* Slightly darker text */
      --btn-bg: #f3f4f7; /* Slightly adjusted button bg */
      --btn-hover-bg: #e8eaf6; /* Match gradient start */
      --btn-shadow: rgba(174, 174, 192, 0.4); /* Softer shadow */
      --btn-shadow-inset: rgba(174, 174, 192, 0.2);
      --btn-shadow-light: #ffffff;
      --primary-color: #673ab7; /* Deep purple */
      --primary-color-light: #9575cd; /* Lighter purple */
      --accent-color: #ff4081; /* Pink */
      --accent-color-dark: #f50057;
      --display-bg: #e8e8e8; /* Slightly different display bg */
      --display-text: #222;
      --modal-bg: #f8f9fa; /* Very light modal bg */
      --modal-shadow: rgba(0,0,0,0.1);
      --modal-shadow-light: rgba(255,255,255,0.7);
      --history-item-hover: #e9e9ed;
      --scrollbar-thumb: #b0b0c0; /* Softer scrollbar */
      --scrollbar-track: #f1f1f1;
      --preview-text-color: var(--primary-color-light);
      --icon-color: var(--primary-color);
      --error-color: #d32f2f;
      --warning-color: #f57c00;
      --equal-btn-bg: var(--primary-color);
      --equal-btn-hover: #512da8; /* Darker purple */
      --equal-btn-text: #fff;
      --equal-btn-shadow: rgba(103, 58, 183, 0.4);
      --equal-btn-shadow-light: rgba(149, 117, 205, 0.6);

    }
    [data-theme="dark"] {
      --bg-color-start: #1f1f2e; /* Dark blue/purple */
      --bg-color-end: #121212; /* Existing dark */
      --bg-gradient: linear-gradient(145deg, var(--bg-color-start), var(--bg-color-end));
      --text-color: #e0e0e0; /* Lighter text */
      --btn-bg: #282830; /* Darker button bg */
      --btn-hover-bg: #353540;
      --btn-shadow: rgba(0,0,0,0.5);
      --btn-shadow-inset: rgba(0,0,0,0.3);
      --btn-shadow-light: #3a3a44; /* Adjusted light shadow */
      --primary-color: #bb86fc; /* Lighter purple for dark mode */
      --primary-color-light: #d0b3ff;
      --accent-color: #f06292; /* Lighter pink */
      --accent-color-dark: #ec407a;
      --display-bg: #2c2c34; /* Darker display bg */
      --display-text: #eee;
      --modal-bg: #212129; /* Darker modal */
      --modal-shadow: rgba(0,0,0,0.5);
      --modal-shadow-light: #33333d;
      --history-item-hover: #353540;
      --scrollbar-thumb: #555;
      --scrollbar-track: #282830;
      --preview-text-color: var(--primary-color-light);
      --icon-color: var(--primary-color);
      --error-color: #ef9a9a; /* Lighter red */
      --warning-color: #ffcc80; /* Lighter orange */
      --equal-btn-bg: var(--primary-color);
      --equal-btn-hover: #a367e7;
      --equal-btn-text: #121212; /* Dark text on light purple */
      --equal-btn-shadow: rgba(187, 134, 252, 0.4);
      --equal-btn-shadow-light: rgba(208, 179, 255, 0.3);
    }

    /* Container */
    .calculator {
      background: var(--btn-bg); /* Solid background for calculator itself */
      border-radius: 25px; /* Slightly more rounded */
      box-shadow:
        10px 10px 20px var(--btn-shadow), /* Deeper shadow */
        -10px -10px 20px var(--btn-shadow-light);
      width: 360px;
      max-width: 100%;
      padding: 25px; /* More padding */
      display: flex;
      flex-direction: column;
      user-select: none;
      transition: box-shadow 0.4s ease, background-color 0.4s ease;
      border: 1px solid rgba(0,0,0,0.02); /* Subtle border */
    }
    [data-theme="dark"] .calculator {
        border: 1px solid rgba(255,255,255,0.05);
    }


    /* Display Container & Styles */
    .display-container {
        position: relative;
        margin-bottom: 25px; /* Increased space */
        background-color: var(--display-bg);
        border-radius: 15px;
        box-shadow: inset 5px 5px 8px var(--btn-shadow-inset), /* Adjusted inset shadow */
                    inset -5px -5px 8px var(--btn-shadow-light);
        transition: background-color 0.3s ease, box-shadow 0.3s ease;
        overflow: hidden;
        padding: 15px 20px; /* Padding applied here */
    }

    .display {
        background-color: transparent;
        border-radius: 0;
        box-shadow: none;
        margin-bottom: 5px; /* Space between display and preview */
        padding: 0; /* Padding handled by container */
        min-height: 55px; /* Slightly taller */
        color: var(--display-text);
        font-size: 2.4rem; /* Slightly larger */
        font-weight: 600; /* Less bold */
        text-align: right;
        letter-spacing: 1px;
        overflow-wrap: break-word;
        word-wrap: break-word;
        word-break: break-all;
        line-height: 1.3;
        transition: color 0.3s ease;
        width: 100%;
    }

    .live-preview {
        min-height: 25px;
        font-size: 1rem;
        color: var(--preview-text-color);
        opacity: 0.9; /* Less faded */
        text-align: right;
        padding: 0; /* Padding handled by container */
        font-weight: 500; /* Medium weight */
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        transition: color 0.3s ease, opacity 0.3s ease;
        letter-spacing: 0.5px;
        width: 100%;
    }

    /* Buttons grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px; /* Increased gap */
    }

    /* Button styles */
    button {
      background-color: var(--btn-bg);
      border: none;
      border-radius: 15px; /* Keep consistent radius */
      box-shadow:
        5px 5px 10px var(--btn-shadow), /* Adjusted shadow */
        -5px -5px 10px var(--btn-shadow-light);
      font-size: 1.4rem; /* Slightly larger font */
      font-weight: 500; /* Medium weight */
      color: var(--text-color);
      padding: 18px 0; /* More padding */
      cursor: pointer;
      transition: background-color 0.2s ease, box-shadow 0.2s ease, color 0.2s ease, transform 0.1s ease; /* Added transform */
      user-select: none;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative; /* For potential future pseudo-elements */
    }
    button:hover {
      background-color: var(--btn-hover-bg);
      transform: translateY(-2px); /* Subtle lift on hover */
       box-shadow:
        7px 7px 12px var(--btn-shadow), /* Enhance shadow on hover */
        -7px -7px 12px var(--btn-shadow-light);
    }
    button:active, button.active-keypress { /* Style for both click and keypress */
      box-shadow:
        inset 4px 4px 6px var(--btn-shadow-inset),
        inset -4px -4px 6px var(--btn-shadow-light);
      font-size: 1.35rem; /* Slightly less shrink */
      transform: translateY(1px); /* Simulate press down */
      background-color: var(--btn-hover-bg); /* Keep hover bg on active */
    }

    /* Special buttons */
    .operator, .parenthesis {
      color: var(--accent-color);
      font-weight: 600; /* Bold operators */
    }
    .equal {
      background-color: var(--equal-btn-bg);
      color: var(--equal-btn-text);
      grid-column: span 4;
      font-weight: 700; /* Bold equals */
      font-size: 1.6rem; /* Larger equals */
      box-shadow:
        6px 6px 12px var(--equal-btn-shadow),
        -6px -6px 12px var(--equal-btn-shadow-light);
    }
    .equal:hover {
      background-color: var(--equal-btn-hover);
      transform: translateY(-2px); /* Consistent hover lift */
      box-shadow:
        8px 8px 15px var(--equal-btn-shadow), /* Enhance shadow on hover */
        -8px -8px 15px var(--equal-btn-shadow-light);
    }
     .equal:active, .equal.active-keypress {
        background-color: var(--equal-btn-hover);
        box-shadow:
            inset 4px 4px 8px rgba(0,0,0,0.2), /* Darker inset for colored button */
            inset -4px -4px 8px rgba(255,255,255,0.1);
        transform: translateY(1px);
     }
     [data-theme="dark"] .equal:active, [data-theme="dark"] .equal.active-keypress {
         box-shadow:
            inset 4px 4px 8px rgba(0,0,0,0.4),
            inset -4px -4px 8px rgba(255,255,255,0.1);
     }

    .clear {
      color: var(--error-color);
      font-weight: 600;
    }
    .backspace {
      color: var(--warning-color);
      font-weight: 600;
    }
    /* SVG Icons in Buttons */
    button svg {
        width: 1.4em; /* Relative size to font */
        height: 1.4em;
        vertical-align: middle;
        fill: currentColor; /* Inherit button color */
        transition: transform 0.2s ease;
    }
    .backspace svg {
        width: 1.6em;
        height: 1.6em;
    }


    /* Header */
    header {
      width: 360px; /* Match calculator width */
      max-width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px; /* Increased margin */
      padding: 0 10px;
    }
    header h1 {
      font-size: 1.6rem; /* Slightly larger title */
      margin: 0;
      user-select: none;
      font-weight: 600;
      color: var(--primary-color); /* Use primary color for title */
       text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }
    [data-theme="dark"] header h1 {
        text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
    }
    .header-buttons {
      display: flex;
      gap: 15px; /* Increased gap */
    }
    #settings-btn, #history-btn {
      background: var(--btn-bg); /* Give buttons a background */
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--icon-color); /* Use icon color */
      transition: all 0.3s ease;
      padding: 8px; /* Padding for the button */
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px; /* Rounded corners */
      width: 40px; /* Fixed size */
      height: 40px;
      box-shadow: 3px 3px 6px var(--btn-shadow), -3px -3px 6px var(--btn-shadow-light);
    }
    #settings-btn:hover, #history-btn:hover {
      color: var(--accent-color);
      transform: translateY(-2px) scale(1.05); /* Lift and scale */
      box-shadow: 5px 5px 8px var(--btn-shadow), -5px -5px 8px var(--btn-shadow-light);
    }
     #settings-btn:active, #history-btn:active {
         transform: translateY(0px) scale(0.95); /* Press down */
         box-shadow: inset 2px 2px 4px var(--btn-shadow-inset), inset -2px -2px 4px var(--btn-shadow-light);
         background-color: var(--btn-hover-bg);
     }
     #settings-btn svg, #history-btn svg {
        width: 1.2em;
        height: 1.2em;
     }

    /* Modal styles */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.65); /* Darker backdrop */
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
      backdrop-filter: blur(5px); /* Stronger blur */
      opacity: 0; /* Start hidden for animation */
      transition: opacity 0.3s ease; /* Fade-in transition */
    }
    .modal.active {
      display: flex;
      opacity: 1;
    }
    .modal-content {
      background: var(--modal-bg);
      color: var(--text-color);
      border-radius: 20px; /* More rounded */
      max-width: 480px; /* Wider modal */
      width: 100%;
      padding: 30px; /* More padding */
      box-shadow:
        0 15px 30px var(--modal-shadow), /* Stronger modal shadow */
        0 0 0 1px rgba(0,0,0,0.05); /* Subtle border */
      position: relative;
      user-select: text;
      max-height: 85vh; /* Limit height slightly more */
      display: flex;
      flex-direction: column;
      transition: background-color 0.3s ease, color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
      transform: scale(0.95); /* Start slightly small */
      opacity: 0; /* Start transparent */
    }
    .modal.active .modal-content {
       transform: scale(1); /* Scale up */
       opacity: 1; /* Fade in */
    }
    [data-theme="dark"] .modal-content {
       box-shadow: 0 15px 30px var(--modal-shadow), 0 0 0 1px rgba(255,255,255,0.1);
    }

    .modal-content h2 {
      margin-top: 0;
      margin-bottom: 25px; /* Increased margin */
      font-weight: 700;
      font-size: 2rem; /* Larger heading */
      text-align: center;
      color: var(--primary-color);
    }
    .modal-content label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 1.1rem; /* Slightly larger label */
    }
    /* Custom Select Styling */
    .select-wrapper {
        position: relative;
        margin-bottom: 25px;
    }
    .select-wrapper::after { /* Custom arrow */
        content: '▼';
        font-size: 0.8rem;
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--primary-color);
        pointer-events: none; /* Allows clicking the select */
        transition: color 0.3s ease;
    }
    .modal-content select {
      width: 100%;
      padding: 12px 40px 12px 15px; /* Adjust padding for arrow */
      font-size: 1rem;
      border-radius: 10px; /* Rounded select */
      border: 1px solid rgba(0,0,0,0.1);
      background-color: var(--btn-bg);
      color: var(--text-color);
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
      appearance: none; /* Remove default appearance */
      -webkit-appearance: none;
      -moz-appearance: none;
      cursor: pointer;
    }
     [data-theme="dark"] .modal-content select {
        border: 1px solid rgba(255,255,255,0.15);
     }
     .modal-content select:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px var(--primary-color-light);
     }


    .modal-content button.close-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      font-size: 2rem; /* Larger close button */
      cursor: pointer;
      color: var(--primary-color);
      font-weight: 400; /* Lighter weight */
      transition: color 0.3s ease, transform 0.2s ease;
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      border-radius: 50%; /* Circular hover */
    }
    .modal-content button.close-btn:hover {
      color: var(--accent-color);
      transform: scale(1.1) rotate(90deg); /* Rotate on hover */
      background-color: rgba(0,0,0,0.05);
    }
     [data-theme="dark"] .modal-content button.close-btn:hover {
        background-color: rgba(255,255,255,0.1);
     }

    .modal-content hr {
      border: none;
      height: 1px;
      background-color: rgba(0,0,0,0.1);
      margin: 25px 0; /* Increased margin */
    }
    [data-theme="dark"] .modal-content hr {
        background-color: rgba(255,255,255,0.15);
    }

    /* Settings Modal Specific */
    .modal-content p.about-text {
      font-size: 1rem;
      line-height: 1.6; /* Increased line height */
      margin-bottom: 20px;
      text-align: center;
    }
    .modal-content a.youtube-link {
      display: inline-block; /* Allow button-like styling */
      text-align: center;
      margin-top: 20px;
      color: #fff; /* White text */
      background: var(--primary-color); /* Button background */
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      transition: background-color 0.3s ease, transform 0.2s ease;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }
    .modal-content a.youtube-link:hover {
      background-color: var(--accent-color);
      color: #fff;
      transform: translateY(-2px);
      text-decoration: none;
      box-shadow: 4px 4px 8px rgba(0,0,0,0.25);
    }

    /* History Modal Specific */
    #history-list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px 0;
      overflow-y: auto;
      max-height: 45vh; /* Slightly more height */
      flex-grow: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
      padding-right: 10px; /* Space for scrollbar */
    }
    #history-list::-webkit-scrollbar {
      width: 8px;
    }
    #history-list::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
      border-radius: 4px;
    }
    #history-list::-webkit-scrollbar-thumb {
      background-color: var(--scrollbar-thumb);
      border-radius: 4px;
      border: 2px solid var(--scrollbar-track);
    }
    #history-list li {
      background-color: var(--btn-bg); /* Match button background */
      border-radius: 10px;
      padding: 12px 18px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 2px 2px 4px var(--btn-shadow-inset);
      border: 1px solid rgba(0,0,0,0.03);
    }
     [data-theme="dark"] #history-list li {
        border: 1px solid rgba(255,255,255,0.08);
     }
    #history-list li:hover {
      background-color: var(--history-item-hover);
      transform: translateX(5px); /* Slide right on hover */
      box-shadow: 1px 1px 3px var(--btn-shadow-inset), 0 0 10px var(--primary-color-light); /* Subtle glow */
    }
    #history-list .history-expression {
      font-size: 0.95rem; /* Slightly larger */
      color: var(--text-color);
      opacity: 0.75;
      display: block;
      margin-bottom: 5px;
      word-break: break-all;
      font-weight: 500;
    }
    #history-list .history-result {
      font-size: 1.2rem; /* Larger result */
      font-weight: 600;
      color: var(--primary-color);
      display: block;
      word-break: break-all;
    }
    #clear-history-btn {
      background-color: var(--accent-color);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
      align-self: center;
      width: auto; /* Fit content */
      min-width: 150px;
      margin-top: 10px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }
    #clear-history-btn:hover {
      background-color: var(--accent-color-dark);
      transform: translateY(-2px);
      box-shadow: 4px 4px 8px rgba(0,0,0,0.25);
    }
    #no-history-msg {
        text-align: center;
        padding: 30px; /* More padding */
        color: var(--text-color);
        opacity: 0.6;
        font-style: italic;
    }


    /* Responsive */
    @media (max-width: 480px) {
      body {
         padding: 10px;
      }
      .calculator {
        width: 100%;
        padding: 20px; /* Adjust padding */
         border-radius: 20px; /* Less rounded on smaller screens */
      }
      header {
        width: 100%;
        padding: 0 5px;
        margin-bottom: 15px;
      }
       header h1 {
          font-size: 1.4rem;
      }
       #settings-btn, #history-btn {
          width: 35px;
          height: 35px;
          padding: 6px;
       }
       .header-buttons {
           gap: 10px;
       }

      .display-container {
         margin-bottom: 20px;
         padding: 12px 15px;
      }
      .display {
          font-size: 2rem;
          min-height: 45px;
      }
       .live-preview {
             min-height: 20px;
             font-size: 0.9rem;
       }
      button {
          font-size: 1.3rem;
          padding: 15px 0;
          border-radius: 12px;
      }
       button svg {
           width: 1.3em;
           height: 1.3em;
       }
       .backspace svg {
            width: 1.5em;
            height: 1.5em;
       }
      .buttons {
          gap: 12px; /* Adjust gap */
      }

       .modal-content {
           padding: 25px;
           max-height: 85vh;
           border-radius: 15px;
       }
       .modal-content h2 {
           font-size: 1.7rem;
           margin-bottom: 20px;
       }
       .modal-content label {
           font-size: 1rem;
       }
        .select-wrapper {
            margin-bottom: 20px;
        }
        .modal-content select {
           padding: 10px 35px 10px 12px;
        }
       #clear-history-btn {
           min-width: 130px;
           padding: 10px 15px;
       }
    }
  </style>
</head>
<body data-theme="light">
  <header>
    <h1 id="app-title">Calculator</h1>
    <div class="header-buttons">
        <button id="history-btn" aria-label="Open History" title="History">
             <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M13 3C17.4183 3 21 6.58172 21 11C21 15.4183 17.4183 19 13 19H6.5C3.46243 19 1 16.5376 1 13.5C1 10.4624 3.46243 8 6.5 8H13V10H6.5C4.567 10 3 11.567 3 13.5C3 15.433 4.567 17 6.5 17H13C16.3137 17 19 14.3137 19 11C19 7.68629 16.3137 5 13 5V3Z M12 1H14V5H12V1ZM12 19H14V23H12V19Z"></path></svg>
             <!-- History Icon -->

  <script>

      // State (unchanged)
      let expression = '0';

      // Language strings (unchanged, assuming text content is ok)
      const strings = {

          youtubeText: '𝙰𝚁𝚇 𝙲𝙾𝙼𝙼𝚄𝙽𝙸𝚃𝚈',
          historyTitle: 'Calculation History',

        },
        hi: {
          title: 'कैलकुलेटर',
          clear: 'साफ़',
          backspaceLabel: 'पिछला', // Label for aria
          settingsTitle: 'सेटिंग्स',
          languageLabel: 'भाषा:',
          themeLabel: 'थीम:',
          aboutText: '𝙰𝚁𝚇 𝙲𝙾𝙼𝙼𝚄𝙽𝙸𝚃𝚈 द्वारा बनाया गया\nएक सरल, साफ़ और शक्तिशाली कैलकुलेटर टूल।',
          youtubeText: '𝙰𝚁𝚇 𝙲𝙾𝙼𝙼𝚄𝙽𝙸𝚃𝚈',
          historyTitle: 'गणना इतिहास',

          invalidExpr: 'अमान्य व्यंजक',
          divByZero: 'शून्य से भाग नहीं दे सकते',

        }

      // --- Utility Functions ---

      function getCurrentLangStrings() {
          return strings[languageSelect.value] || strings.en;
      }

      // Update Display: Simplified, as operators are handled by icons/direct input now
      function updateDisplay(value) {
          let displayValue = value.toString();
          const s = getCurrentLangStrings();

          // Only translate error messages now
          if (displayValue === strings.en.error) displayValue = s.error;
          else if (displayValue === strings.en.invalidExpr) displayValue = s.invalidExpr;
          else if (displayValue === strings.en.divByZero) displayValue = s.divByZero;
          // No need to replace operators visually in the display string itself

          display.textContent = displayValue;

          // Adjust font size logic (improved)
          const maxFontSize = 2.4; // Corresponds to initial CSS
          const minFontSize = 1;
          let currentFontSize = maxFontSize;
          display.style.fontSize = `${currentFontSize}rem`;
          display.style.lineHeight = '1.3'; // Reset line height

          // Reduce font size
          while ((display.scrollWidth > display.clientWidth || display.scrollHeight > display.clientHeight * 1.1) && currentFontSize > minFontSize) { // Check height too
              currentFontSize = Math.max(minFontSize, currentFontSize - 0.1);
              display.style.fontSize = `${currentFontSize}rem`;
              // Increase line-height slightly as font shrinks to prevent clipping
              display.style.lineHeight = `${1.3 + (maxFontSize - currentFontSize) * 0.1}`;
              if (currentFontSize === minFontSize) break;
          }
          // Increase font size (minor adjustment)
          // This part is less critical now with height check, keep simple
          if (display.scrollWidth <= display.clientWidth && display.scrollHeight <= display.clientHeight * 1.1 && currentFontSize < maxFontSize) {
             // Optional: Add logic to slightly increase if space permits, but avoid complex loops here.
             // The reduction logic is usually sufficient.
          }
      }


      // --- Live Preview Logic --- (Functionally unchanged, but relies on updated display)
      function isPotentiallyEvaluatable(expr) {
          const trimmedExpr = expr.trim();
          if (!trimmedExpr || trimmedExpr === '0' || trimmedExpr === '-') return false;

          const lastChar = trimmedExpr.slice(-1);
          if (['+', '-', '*', '/', '(', '.', '%'].includes(lastChar)) {
              return false;
          }
          const openParens = (trimmedExpr.match(/\(/g) || []).length;
          const closeParens = (trimmedExpr.match(/\)/g) || []).length;
          if (openParens > closeParens) {
              return false;
          }
          const s = getCurrentLangStrings(); // Get current strings for error check
          const errorMessages = [s.error, s.invalidExpr, s.divByZero];
          if (errorMessages.includes(trimmedExpr)) {
              return false;
          }
          // Check if it's just a number (more robust check)
          try {
             // If it consists only of digits, '.', and maybe a leading '-', it's likely just a number
             if (/^-?\d*\.?\d+$/.test(trimmedExpr) && !/[+\-*/%()]/.test(trimmedExpr.substring(1))) {
                 return false; // Don't preview if it's just a number being typed
             }
             // Allow preview for single number inside balanced parens, e.g., (5)
             if (/^\(-?\d*\.?\d+\)$/.test(trimmedExpr)) {
                 return true;
             }
          } catch {}

          // Requires at least one operator (not just leading minus) or parentheses for preview
          return /[+\-*/%()]/.test(trimmedExpr.replace(/^-/, ''));
      }

      function tryEvaluateLive() {
          if (!livePreviewElement) return;

          let exprToEval = expression;
          const s = getCurrentLangStrings();

          if (!isPotentiallyEvaluatable(exprToEval)) {
              livePreviewElement.textContent = '';
              return;
          }

          try {
              if (/[^0-9+\-*/().%]/.test(exprToEval)) {
                   throw new Error("Invalid chars");
               }

              let tempExpr = exprToEval.replace(/%/g, '/100');

              // Robust evaluation needed here
              // Simple Function constructor might fail with complex expressions or edge cases during typing.
              // For live preview, we might accept minor inaccuracies or only evaluate simpler cases.
              // Let's stick with Function constructor but catch errors gracefully.

              // Pre-computation check for safety (e.g., prevent excessively long expressions)
              if (tempExpr.length > 100) { // Limit complexity for live preview
                  livePreviewElement.textContent = '';
                  return;
              }

              let result = Function('"use strict";return (' + tempExpr + ')')();

              if (!isFinite(result)) {
                  livePreviewElement.textContent = '';
              } else {
                  result = Math.round((result + Number.EPSILON) * 1e8) / 1e8; // 8 decimal places

                   // Avoid showing preview if result is same as a simple number expression
                  let currentNumericValue = NaN;
                  try {
                     if (/^-?\d*\.?\d+$/.test(expression)) { // check if current expression is just a number
                         currentNumericValue = parseFloat(expression);
                     }
                  } catch {}

                  if (result !== currentNumericValue) {
                       livePreviewElement.textContent = `= ${result}`;
                   } else {
                       livePreviewElement.textContent = '';
                   }
              }
          } catch (e) {
              // console.warn("Live eval failed:", e.message); // Optional logging
              livePreviewElement.textContent = '';
          }
      }


      // --- Core Calculator Logic --- (Mostly unchanged, but uses updated display/error strings)

       function resetExpression() {
         expression = '0';
         updateDisplay(expression);
         if (livePreviewElement) livePreviewElement.textContent = '';
       }

       function appendToExpression(value) {
         const lastChar = expression.slice(-1);
         const operators = ['+', '*', '/', '%']; // Exclude '-' for specific checks
         const allOperators = ['+', '-', '*', '/', '%'];
         const s = getCurrentLangStrings();
         const errorMessages = [s.error, s.invalidExpr, s.divByZero];

         // Handle starting after error
         if (errorMessages.includes(expression)) {
              if (!allOperators.includes(value) || value === '-' || value === '(' || value === '.') { // Allow starting with number, (, ., or -
                  expression = (value === '.') ? '0.' : value;
                  updateDisplay(expression);
                  tryEvaluateLive();
                  return;
              } else {
                  return; // Ignore other operators after error
              }
         }

         // Standard logic for appending (mostly unchanged from previous version)
         if (operators.includes(lastChar) && operators.includes(value)) {
             expression = expression.slice(0, -1) + value;
         } else if (operators.includes(lastChar) && value === '-') {
              if(lastChar !== '-') {
                  expression += value;
              } else return;
         } else if (lastChar === '-' && value === '-') {
              return;
         } else if (lastChar === '(' && allOperators.includes(value) && value !== '-') {
             return;
         } else if (value === '.' && [')', '%'].includes(lastChar)) {
             return;
         } else if (value === '.') {
             const parts = expression.split(/[\+\-\*\/%\(\)]/);
             if (parts.length > 0 && parts[parts.length - 1].includes('.')) {
                 return;
             }
             if (allOperators.includes(lastChar) || lastChar === '(' || expression === '0') {
                  expression = (expression === '0') ? '0.' : expression + '0.';
             } else {
                  expression += value;
             }
         } else if (expression === '0' && !['.', '(', '-', '%'].includes(value) && !allOperators.includes(value) ) {
              expression = value;
         } else if (expression === '0' && value === '(') {
              expression = '(';
         } else if (expression === '0' && value === '-') {
              expression = '-';
         } else if ( (lastChar === ')' || lastChar === '%') && (/[0-9(]/.test(value)) ) {
              expression += '*' + value;
         } else if (value === '%' && (allOperators.includes(lastChar) || ['(','.'].includes(lastChar)) ) {
              return;
         } else if (value === ')' && (lastChar === '(' || allOperators.includes(lastChar) || lastChar === '.')) {
              return;
         } else if (value === ')') {
              const openParens = (expression.match(/\(/g) || []).length;
              const closeParens = (expression.match(/\)/g) || []).length;
              if (openParens <= closeParens) {
                  return;
              }
              expression += value;
          } else {
             expression += value;
          }

         updateDisplay(expression);
         tryEvaluateLive();
       }

      function backspaceExpression() {
         const s = getCurrentLangStrings();
         const errorMessages = [s.error, s.invalidExpr, s.divByZero];
         if (errorMessages.includes(expression)) {
             resetExpression();
             return;
         }

         if (expression.length > 1) {
           expression = expression.slice(0, -1);
         } else {
           expression = '0';
         }
         // If backspace results in ending with an operator/dot/paren, update preview correctly
         updateDisplay(expression);
         tryEvaluateLive();
       }

      function evaluateExpression() {
         const openParens = (expression.match(/\(/g) || []).length;
         const closeParens = (expression.match(/\)/g) || []).length;
         const s = getCurrentLangStrings();

         if (openParens !== closeParens) {
              expression = s.invalidExpr;
              updateDisplay(expression);
              if (livePreviewElement) livePreviewElement.textContent = '';
              return;
         }
         const lastChar = expression.trim().slice(-1);
          if (['+', '-', '*', '/', '(', '.'].includes(lastChar)) {
              // Allow just a negative number, e.g., "-5"
              if (!(lastChar === '-' && /^-?\d*\.?\d+$/.test(expression))) {
                 expression = s.invalidExpr;
                 updateDisplay(expression);
                 if (livePreviewElement) livePreviewElement.textContent = '';
                 return;
              }
          }

         let exprToEval = expression;
         const originalExpression = expression;

         try {
           if (/[^0-9+\-*/().%]/.test(exprToEval)) {
              throw new Error(s.invalidExpr);
           }

           exprToEval = exprToEval.replace(/%/g, '/100');

           // Final check for division by zero patterns more carefully
           if (/\/0(?!\.)/.test(exprToEval.replace(/\s/g,''))) { // Matches /0, /0*, etc. but not /0.5
                // Further check if it's part of a larger valid expression that might resolve
                // This basic check is often enough, but complex cases might exist.
                // For simplicity, we'll throw the error if the pattern exists.
                // A more robust approach involves parsing the expression tree.
                try {
                    // Try evaluating to see if it naturally becomes Infinity
                    let preliminaryResult = Function('"use strict";return (' + exprToEval + ')')();
                    if (!isFinite(preliminaryResult)) {
                        throw new Error(s.divByZero);
                    }
                    // If it evaluates to a finite number (e.g., 0/0 might be NaN handled later), proceed
                } catch (prelimError) {
                    // If the preliminary evaluation itself throws (like syntax error), rethrow that
                    // If it specifically threw the divByZero error already, let it propagate
                    if (prelimError.message === s.divByZero) throw prelimError;
                     // Otherwise, if /0 pattern exists and evaluation failed, likely div by zero intended
                    throw new Error(s.divByZero);
                }
           }


           let result = Function('"use strict";return (' + exprToEval + ')')();

           if (!isFinite(result)) {
             // Already checked basic /0, so this handles NaN or other Infinities
             throw new Error(s.error); // More generic error now
           }

           result = Math.round((result + Number.EPSILON) * 1e8) / 1e8;

           expression = result.toString();
           updateDisplay(expression);
           addToHistory(originalExpression, expression);
           if (livePreviewElement) livePreviewElement.textContent = '';

         } catch (e) {
           console.error("Calculation Error:", e);
           // Prioritize specific errors if message matches
           expression = e.message === s.divByZero ? s.divByZero :
                        e.message === s.invalidExpr ? s.invalidExpr :
                        s.error; // Default to generic error
           updateDisplay(expression);
           if (livePreviewElement) livePreviewElement.textContent = '';
         }
       }


      // --- History Functions --- (Functionally unchanged, rendering uses symbols directly)
      function loadHistory() {
         const savedHistory = localStorage.getItem('calculatorHistory');
         history = savedHistory ? JSON.parse(savedHistory) : [];
      }

      function saveHistory() {
         localStorage.setItem('calculatorHistory', JSON.stringify(history));
      }

       function addToHistory(expr, res) {
         const s = getCurrentLangStrings();
         const errorMessages = [s.error, s.invalidExpr, s.divByZero];
         if (expr === res || errorMessages.includes(res)) return;

         if (history.length > 0) {
             const lastEntry = history[history.length - 1];
             if (lastEntry.expression === expr && lastEntry.result === res) {
                 return;
             }
         }

         history.push({ expression: expr, result: res });
         if (history.length > MAX_HISTORY) {
           history = history.slice(-MAX_HISTORY);
         }
         saveHistory();
         if (historyModal.classList.contains('active')) {
             renderHistory();
         }
       }

       function renderHistory() {
           const s = getCurrentLangStrings();
           historyList.innerHTML = '';

           if (history.length === 0) {
               noHistoryMsg.textContent = s.noHistory;
               noHistoryMsg.style.display = 'block';
               clearHistoryBtn.style.display = 'none';
               return;
           }

           noHistoryMsg.style.display = 'none';
           clearHistoryBtn.style.display = 'block';

           history.slice().reverse().forEach(item => {
               const li = document.createElement('li');
               li.setAttribute('role', 'button');
               li.setAttribute('tabindex', '0');
               // Use actual expression and result in label
               li.setAttribute('aria-label', `Calculation: ${item.expression} equals ${item.result}. Click to use result.`);

               const exprSpan = document.createElement('span');
               exprSpan.className = 'history-expression';
               // Display expression as it was entered (no symbol replacement needed now)
               exprSpan.textContent = item.expression;

               const resSpan = document.createElement('span');
               resSpan.className = 'history-result';
               resSpan.textContent = `= ${item.result}`;

               li.appendChild(exprSpan);
               li.appendChild(resSpan);

               li.addEventListener('click', () => {
                   expression = item.result.toString();
                   updateDisplay(expression);
                   tryEvaluateLive(); // Show preview if applicable (e.g., if result is used in new calc)
                   closeHistory();
               });
                li.addEventListener('keydown', (e) => {
                   if (e.key === 'Enter' || e.key === ' ') {
                       e.preventDefault();
                       li.click();
                   }
               });

               historyList.appendChild(li);
           });
       }

       function clearHistory() {
           const s = getCurrentLangStrings();
           // Using a more styled confirmation could be an improvement later
           if (confirm(s.clearHistory + "?")) {
             history = [];
             saveHistory();
             renderHistory();
           }
       }


      // --- Modal Handling --- (Unchanged logic, CSS handles animation)
      function openModal(modal) {
          modal.style.display = 'flex'; // Change display first
           setTimeout(() => { // Allow display change to render before starting transition
               modal.classList.add('active');
               const focusable = modal.querySelector('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
               if (focusable) focusable.focus();
           }, 10); // Small delay
      }

      function closeModal(modal) {
          modal.classList.remove('active');
          // Wait for animation to finish before setting display none
          modal.addEventListener('transitionend', () => {
               modal.style.display = 'none';
          }, { once: true }); // Important: only listen once

          if (modal === settingsModal) settingsBtn.focus();
          else if (modal === historyModal) historyBtn.focus();
          else display.focus();
      }

      function openSettings() { openModal(settingsModal); }
      function closeSettings() { closeModal(settingsModal); }
      function openHistory() { renderHistory(); openModal(historyModal); }
      function closeHistory() { closeModal(historyModal); }


      // --- Language and Theme --- (Simplified language update due to icons)
      function updateLanguage() {
         const lang = languageSelect.value;
         const s = strings[lang];
         document.documentElement.lang = lang;
         appTitle.textContent = s.title;
         clearBtn.textContent = s.clear; // Clear button text
         backspaceBtn.setAttribute('aria-label', s.backspaceLabel); // Update aria-label for icon button
         document.getElementById('settings-title').textContent = s.settingsTitle;
         document.querySelector('label[for="language-select"]').textContent = s.languageLabel;
         document.querySelector('label[for="theme-select"]').textContent = s.themeLabel;
         aboutText.innerHTML = s.aboutText.replace(/\n/g, '<br />');
         youtubeLink.textContent = s.youtubeText;
         document.getElementById('history-title').textContent = s.historyTitle;
         clearHistoryBtn.textContent = s.clearHistory;
         if (noHistoryMsg) noHistoryMsg.textContent = s.noHistory;

         // No need to update operator button text content as they use icons/symbols directly

         if (historyModal.classList.contains('active')) {
             renderHistory();
         }
         // Update display/preview if showing error messages
         updateDisplay(expression);
         tryEvaluateLive();
       }

      function updateTheme() {
         const theme = themeSelect.value;
         document.body.setAttribute('data-theme', theme);
         localStorage.setItem('calculatorTheme', theme);
       }

      function loadPreferences() {
           const savedLang = localStorage.getItem('calculatorLang');
           const savedTheme = localStorage.getItem('calculatorTheme');
           if (savedLang && strings[savedLang]) {
               languageSelect.value = savedLang;
           }
           if (savedTheme) {
               themeSelect.value = savedTheme;
           }
           loadHistory();
       }

      // --- Event Listeners --- (Added active-keypress logic)

      buttons.forEach(btn => {
         btn.addEventListener('click', () => {
           appendToExpression(btn.getAttribute('data-value'));
           btn.blur();
         });
       });

      clearBtn.addEventListener('click', () => { resetExpression(); clearBtn.blur(); });
      backspaceBtn.addEventListener('click', () => { backspaceExpression(); backspaceBtn.blur(); });
      equalsBtn.addEventListener('click', () => { evaluateExpression(); equalsBtn.blur(); });

      // Keyboard support
      window.addEventListener('keydown', (e) => {
         // Improved check for modal focus
         const activeModal = document.querySelector('.modal.active');
         if (activeModal) {
             // Allow Escape key even if focus is inside modal elements
             if (e.key === 'Escape') {
                 if (settingsModal.classList.contains('active')) closeSettings();
                 if (historyModal.classList.contains('active')) closeHistory();
                 e.preventDefault(); // Prevent default escape behavior (like closing fullscreen)
                 return;
             }
             // Prevent calculator input if focus is inside modal's interactive elements
             const activeElement = document.activeElement;
              if (activeElement && activeModal.contains(activeElement) && ['SELECT', 'INPUT', 'TEXTAREA', 'BUTTON', 'A'].includes(activeElement.tagName)) {
                 return;
             }
         }

         const key = e.key;
         let handled = false;
         let targetButton = null; // Track which button corresponds to the key

         if (key >= '0' && key <= '9') { handled = true; targetButton = document.querySelector(`.buttons button[data-value="${key}"]`); appendToExpression(key); }
         else if (['+', '-', '*', '/', '%', '.', '(', ')'].includes(key)) { handled = true; targetButton = document.querySelector(`.buttons button[data-value="${key}"]`); appendToExpression(key); }
         else if (key === 'Enter' || key === '=') { handled = true; targetButton = equalsBtn; evaluateExpression(); }
         else if (key === 'Backspace') { handled = true; targetButton = backspaceBtn; backspaceExpression(); }
         else if (key.toLowerCase() === 'c' && !e.ctrlKey && !e.metaKey && !e.altKey) { handled = true; targetButton = clearBtn; resetExpression(); }
         // Escape key handled above for modals

         if (handled) {
             e.preventDefault();
             if (targetButton) {
                 targetButton.classList.add('active-keypress'); // Add visual feedback class
                 // Remove the class after a short delay
                 setTimeout(() => {
                    if (targetButton) targetButton.classList.remove('active-keypress');
                 } , 150);
             }
         }
       });

       // Modal events (backdrop click improved)
       settingsBtn.addEventListener('click', openSettings);
       closeSettingsBtn.addEventListener('click', closeSettings);
       settingsModal.addEventListener('click', (e) => {
         if (e.target === settingsModal) closeSettings(); // Close only if clicking the backdrop itself
       });

       historyBtn.addEventListener('click', openHistory);
       closeHistoryBtn.addEventListener('click', closeHistory);
       historyModal.addEventListener('click', (e) => {
         if (e.target === historyModal) closeHistory();
       });
       clearHistoryBtn.addEventListener('click', clearHistory);


       // Preference change events
       languageSelect.addEventListener('change', () => {
           updateLanguage();
           localStorage.setItem('calculatorLang', languageSelect.value);
       });
       themeSelect.addEventListener('change', updateTheme);


       // --- Initialization ---
       function init() {
         loadPreferences();
         updateTheme();
         updateLanguage();
         resetExpression();
         // Don't focus display initially, let user click or tab
         // display.focus();
       }

       init();

    })();
  </script>
</body>
