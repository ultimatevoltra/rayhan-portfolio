<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #121212;
      --surface-color: #1e1e1e;
      --highlight-color: #2c2c2c;
      --x-color: #ff2e63; /* Neon Red */
      --o-color: #08d9d6; /* Neon Cyan */
      --text-main: #eaeaea;
      --text-dim: #757575;
      --gradient-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      --shadow-soft: 0 10px 30px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--gradient-bg);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Confetti Canvas */
    #confetti-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 50;
    }

    /* --- Screens --- */
    .screen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease, transform 0.5s ease;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
      padding: 20px;
    }

    .screen.active {
      opacity: 1;
      pointer-events: all;
      z-index: 10;
    }

    /* --- Start Screen (Mobile Optimized) --- */
    h1 {
      font-size: clamp(3rem, 10vw, 5rem); /* Responsive Font Size */
      font-weight: 900;
      margin-bottom: 40px;
      letter-spacing: -2px;
      text-transform: uppercase;
      text-shadow: 0 10px 20px rgba(0,0,0,0.3);
      text-align: center;
      line-height: 1.1;
    }
    h1 .x { color: var(--x-color); text-shadow: 0 0 20px rgba(255, 46, 99, 0.5); }
    h1 .o { color: var(--o-color); text-shadow: 0 0 20px rgba(8, 217, 214, 0.5); }

    .btn-group { 
        display: flex; 
        flex-direction: column; 
        gap: 20px; 
        width: 100%; 
        max-width: 320px; 
    }

    button {
      background: var(--surface-color);
      color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 20px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    button::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: translateX(-100%);
      transition: 0.5s;
    }

    button:hover::after { transform: translateX(100%); }
    button:hover { transform: translateY(-3px); background: var(--highlight-color); border-color: rgba(255,255,255,0.3); }
    button:active { transform: translateY(1px); }

    /* --- Loading Screen --- */
    .loading-screen {
      background: #000;
      z-index: 999;
      flex-direction: column;
    }
    .loader {
      width: 50px; height: 50px;
      border: 5px solid var(--surface-color);
      border-top: 5px solid var(--o-color);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    .creator { margin-top: 20px; font-size: 0.9rem; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* --- Game UI --- */
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 340px;
      margin-bottom: 25px;
    }

    .turn-indicator {
      display: flex;
      background: var(--surface-color);
      padding: 5px;
      border-radius: 50px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }
    
    .turn-box {
      padding: 8px 20px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-dim);
      transition: 0.3s;
    }
    
    .turn-box.active-x { background: var(--x-color); color: #fff; box-shadow: 0 0 15px var(--x-color); }
    .turn-box.active-o { background: var(--o-color); color: #000; box-shadow: 0 0 15px var(--o-color); }

    .scoreboard {
      display: flex;
      gap: 15px;
      font-size: 0.9rem;
      color: var(--text-dim);
    }
    .score-item span { color: #fff; font-weight: bold; margin-left: 5px; }

    .board-container { position: relative; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 12px;
    }

    .cell {
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3.5rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .cell:hover { background: rgba(255, 255, 255, 0.08); }
    
    .cell.x { color: var(--x-color); text-shadow: 0 0 10px rgba(255, 46, 99, 0.6); }
    .cell.o { color: var(--o-color); text-shadow: 0 0 10px rgba(8, 217, 214, 0.6); }

    .cell.dim { opacity: 0.3; }
    
    .strike-line {
      position: absolute;
      height: 6px;
      background: #fff;
      border-radius: 3px;
      transform-origin: left center;
      z-index: 5;
      box-shadow: 0 0 15px #fff, 0 0 25px currentColor;
      width: 0;
      transition: width 0.4s ease-out;
    }

    .controls { margin-top: 30px; display: flex; gap: 15px; }
    .controls button { padding: 12px 20px; font-size: 0.9rem; min-width: 120px; }
    .btn-secondary { background: transparent; border: 1px solid #444; }

    #statusText {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: 600;
      min-height: 27px;
      color: var(--text-main);
    }

    /* --- VICTORY OVERLAY & BUTTONS --- */
    .winner-overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        padding: 20px;
    }
    
    .winner-overlay.active {
        opacity: 1;
        pointer-events: all;
    }

    .winner-text {
        font-size: 3.5rem;
        font-weight: 900;
        text-transform: uppercase;
        margin-bottom: 10px;
        text-align: center;
        animation: zoomIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .winner-subtext {
        font-size: 1.1rem;
        color: #aaa;
        margin-bottom: 40px;
    }

    .winner-btn-group {
        display: flex;
        gap: 15px;
        width: 100%;
        max-width: 400px;
        justify-content: center;
    }

    .winner-btn {
        padding: 15px 30px;
        font-size: 1.1rem;
        border: none;
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
        animation: fadeInUp 0.8s ease;
        flex: 1;
    }
    
    .winner-btn.primary {
        background: #fff;
        color: #000;
    }
    .winner-btn.primary:hover { background: #f0f0f0; transform: translateY(-3px); }

    .winner-btn.secondary {
        background: rgba(255,255,255,0.1);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.2);
    }
    .winner-btn.secondary:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }

    @keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes fadeInUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Mobile Responsiveness */
    @media (max-width: 450px) {
      .board {
        grid-template-columns: repeat(3, 85px);
        grid-template-rows: repeat(3, 85px);
        gap: 8px;
      }
      .cell { width: 85px; height: 85px; font-size: 2.8rem; border-radius: 12px; }
      .game-header { width: 280px; flex-direction: column; gap: 15px; }
      .winner-text { font-size: 2.8rem; }
      .winner-btn-group { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- CANVAS FOR ANIMATION -->
  <canvas id="confetti-canvas"></canvas>

  <!-- START SCREEN -->
  <div class="screen active" id="startScreen">
    <h1><span class="x">Tic</span> Tac <span class="o">Toe</span></h1>
    <div class="btn-group">
      <button onclick="app.startGame('pvp')">Player vs Player</button>
      <button onclick="app.startGame('computer')">Player vs AI</button>
    </div>
  </div>

  <!-- LOADING SCREEN -->
  <div class="screen loading-screen" id="loadingScreen">
    <div class="loader"></div>
    <div style="font-weight: bold; font-size: 1.2rem;">LOADING</div>
    <div class="creator">Created By Spidey</div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen" id="gameScreen">
    
    <!-- WINNER OVERLAY -->
    <div class="winner-overlay" id="winnerOverlay">
        <div class="winner-text" id="winnerText">X WINS!</div>
        <div class="winner-subtext" id="winnerSubtext">Outstanding Move!</div>
        
        <div class="winner-btn-group">
            <button class="winner-btn primary" onclick="app.restartGame()">Play Again</button>
            <button class="winner-btn secondary" onclick="app.backToMenu()">Home</button>
        </div>
    </div>

    <div class="game-header">
      <div class="turn-indicator">
        <div class="turn-box active-x" id="turnX">X</div>
        <div class="turn-box" id="turnO">O</div>
      </div>
      <div class="scoreboard">
        <div class="score-item">X: <span id="scoreX">0</span></div>
        <div class="score-item">O: <span id="scoreO">0</span></div>
      </div>
    </div>

    <div class="board-container">
      <div class="board" id="gameBoard"></div>
    </div>

    <div id="statusText">Your Turn</div>

    <div class="controls">
      <button class="btn-secondary" onclick="app.backToMenu()">Home</button>
      <button onclick="app.restartGame()">Restart</button>
    </div>
  </div>

  <script>
    const app = (() => {
      // DOM Elements
      const startScreen = document.getElementById('startScreen');
      const loadingScreen = document.getElementById('loadingScreen');
      const gameScreen = document.getElementById('gameScreen');
      const gameBoard = document.getElementById('gameBoard');
      const statusText = document.getElementById('statusText');
      const turnX = document.getElementById('turnX');
      const turnO = document.getElementById('turnO');
      const scoreXEl = document.getElementById('scoreX');
      const scoreOEl = document.getElementById('scoreO');
      const winnerOverlay = document.getElementById('winnerOverlay');
      const winnerText = document.getElementById('winnerText');

      // Game State
      let gameState = ["", "", "", "", "", "", "", "", ""];
      let currentPlayer = "X";
      let running = false;
      let gameMode = ""; 
      let scores = { X: 0, O: 0 };
      let cells = [];

      const winConditions = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6]
      ];

      // --- Navigation ---

      const startGame = (mode) => {
        gameMode = mode;
        startScreen.classList.remove('active');
        loadingScreen.classList.add('active');
        setTimeout(() => {
          loadingScreen.classList.remove('active');
          gameScreen.classList.add('active');
          initializeBoard();
        }, 1200);
      };

      const backToMenu = () => {
        // Hide game and overlay
        gameScreen.classList.remove('active');
        winnerOverlay.classList.remove('active');
        startScreen.classList.add('active');
        
        // Reset scores and state
        scores = { X: 0, O: 0 };
        updateScoreboard();
        running = false;
      };

      const initializeBoard = () => {
        gameBoard.innerHTML = '';
        cells = [];
        gameState.fill("");
        currentPlayer = "X";
        running = true;
        updateTurnIndicator();
        statusText.textContent = "Start Game";
        winnerOverlay.classList.remove('active'); // Ensure overlay is gone
        
        const oldLine = document.querySelector('.strike-line');
        if (oldLine) oldLine.remove();

        for (let i = 0; i < 9; i++) {
          const cell = document.createElement('div');
          cell.classList.add('cell');
          cell.setAttribute('data-index', i);
          cell.addEventListener('click', cellClicked);
          gameBoard.appendChild(cell);
          cells.push(cell);
        }
      };

      const restartGame = () => {
        gameState.fill("");
        currentPlayer = "X";
        running = true;
        statusText.textContent = "Game Restarted";
        statusText.style.color = "var(--text-main)";
        winnerOverlay.classList.remove('active');
        
        const oldLine = document.querySelector('.strike-line');
        if (oldLine) oldLine.remove();

        cells.forEach(cell => {
          cell.textContent = "";
          cell.classList.remove('x', 'o', 'dim');
          cell.style.transform = "scale(1)";
        });
        updateTurnIndicator();
      };

      // --- Game Logic ---

      const cellClicked = function() {
        const index = this.getAttribute('data-index');
        if (gameState[index] !== "" || !running) return;
        if (gameMode === 'computer' && currentPlayer === 'O') return;

        processMove(index);

        if (running && gameMode === 'computer') {
            statusText.textContent = "AI is thinking...";
            const delay = Math.random() * 400 + 400; 
            setTimeout(computerMove, delay);
        }
      };

      const processMove = (index) => {
        gameState[index] = currentPlayer;
        const cell = cells[index];
        cell.textContent = currentPlayer;
        cell.classList.add(currentPlayer.toLowerCase());
        
        cell.style.transform = "scale(0.9)";
        setTimeout(() => cell.style.transform = "scale(1)", 100);

        if (checkWinner()) {
            return;
        } else if (!gameState.includes("")) {
            endGame(null); 
        } else {
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            updateTurnIndicator();
            statusText.textContent = gameMode === 'pvp' 
                ? `Player ${currentPlayer}'s Turn` 
                : (currentPlayer === 'X' ? "Your Turn" : "AI Turn");
        }
      };

      const updateTurnIndicator = () => {
        if(currentPlayer === "X") {
            turnX.classList.add('active-x');
            turnO.classList.remove('active-o');
        } else {
            turnX.classList.remove('active-x');
            turnO.classList.add('active-o');
        }
      };

      const updateScoreboard = () => {
        scoreXEl.textContent = scores.X;
        scoreOEl.textContent = scores.O;
      };

      const endGame = (winCombo) => {
        running = false;
        
        if (winCombo) {
            scores[currentPlayer]++;
            updateScoreboard();
            drawWinningLine(winCombo);
            
            // 1. Dim the losing cells
            cells.forEach((cell, idx) => {
                if(!winCombo.includes(idx)) cell.classList.add('dim');
            });

            // 2. Trigger Victory Overlay & Animation
            setTimeout(() => {
                const color = currentPlayer === "X" ? "#ff2e63" : "#08d9d6";
                winnerText.textContent = `${currentPlayer} WINS!`;
                winnerText.style.color = color;
                winnerText.style.textShadow = `0 0 20px ${color}`;
                winnerOverlay.classList.add('active');
                
                // Fire Confetti!
                startConfetti(color);
            }, 500);

        } else {
            winnerText.textContent = "DRAW!";
            winnerText.style.color = "#fff";
            winnerText.style.textShadow = "none";
            winnerOverlay.classList.add('active');
        }
      };

      const checkWinner = () => {
        for (let condition of winConditions) {
          const [a, b, c] = condition;
          if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
            endGame(condition);
            return true;
          }
        }
        return false;
      };

      const drawWinningLine = (combo) => {
        const boardRect = gameBoard.getBoundingClientRect();
        const cell1 = cells[combo[0]].getBoundingClientRect();
        const cell3 = cells[combo[2]].getBoundingClientRect();
        const x1 = cell1.left + cell1.width / 2 - boardRect.left;
        const y1 = cell1.top + cell1.height / 2 - boardRect.top;
        const x2 = cell3.left + cell3.width / 2 - boardRect.left;
        const y2 = cell3.top + cell3.height / 2 - boardRect.top;
        const length = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        const angle = Math.atan2(y2 - y1, x2 - x1) * (180 / Math.PI);

        const line = document.createElement('div');
        line.classList.add('strike-line');
        line.style.color = currentPlayer === "X" ? "var(--x-color)" : "var(--o-color)";
        line.style.top = `${y1}px`;
        line.style.left = `${x1}px`;
        line.style.transform = `translateY(-50%) rotate(${angle}deg)`;
        
        document.querySelector('.board-container').appendChild(line);
        requestAnimationFrame(() => line.style.width = `${length}px`);
      };

      // --- AI Logic ---
      const computerMove = () => {
        if (gameState.filter(x => x === "").length === 9) {
            processMove(4); return;
        }
        let bestScore = -Infinity;
        let move;
        for (let i = 0; i < 9; i++) {
          if (gameState[i] === "") {
            gameState[i] = "O";
            let score = minimax(gameState, 0, false);
            gameState[i] = "";
            if (score > bestScore) {
              bestScore = score;
              move = i;
            }
          }
        }
        processMove(move);
      };

      const scoresLookup = { X: -10, O: 10, tie: 0 };
      const minimax = (board, depth, isMaximizing) => {
        let result = checkWinnerMinimax();
        if (result !== null) return scoresLookup[result] - (result === "O" ? depth : -depth);

        if (isMaximizing) {
          let bestScore = -Infinity;
          for (let i = 0; i < 9; i++) {
            if (board[i] === "") {
              board[i] = "O";
              let score = minimax(board, depth + 1, false);
              board[i] = "";
              bestScore = Math.max(score, bestScore);
            }
          }
          return bestScore;
        } else {
          let bestScore = Infinity;
          for (let i = 0; i < 9; i++) {
            if (board[i] === "") {
              board[i] = "X";
              let score = minimax(board, depth + 1, true);
              board[i] = "";
              bestScore = Math.min(score, bestScore);
            }
          }
          return bestScore;
        }
      };

      const checkWinnerMinimax = () => {
        for (let condition of winConditions) {
          const [a, b, c] = condition;
          if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
            return gameState[a];
          }
        }
        if (!gameState.includes("")) return "tie";
        return null;
      };

      // --- PARTICLE SYSTEM (CONFETTI) ---
      const startConfetti = (colorHex) => {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const particleCount = 100;

        for(let i=0; i<particleCount; i++){
            particles.push({
                x: canvas.width / 2,
                y: canvas.height / 2,
                r: Math.random() * 4 + 2, // radius
                dx: (Math.random() - 0.5) * 15, // horizontal vel
                dy: (Math.random() - 0.5) * 15, // vertical vel
                color: colorHex,
                alpha: 1,
                decay: Math.random() * 0.015 + 0.005
            });
        }

        const animate = () => {
            // Stop animation if overlay is closed
            if(!winnerOverlay.classList.contains('active')) {
                ctx.clearRect(0,0, canvas.width, canvas.height);
                return;
            }
            requestAnimationFrame(animate);
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            particles.forEach((p, index) => {
                p.x += p.dx;
                p.y += p.dy;
                p.alpha -= p.decay;
                
                if(p.alpha <= 0) {
                    particles.splice(index, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            });
        };
        animate();
      };

      return { startGame, restartGame, backToMenu };
    })();
  </script>
</body>
</html>
